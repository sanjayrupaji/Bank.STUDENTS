# Core Banking API + MongoDB (replica set required for multi-document transactions).
# School Firebase app (index.html) is unchanged — deploy separately via Firebase Hosting.
services:
  mongo:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    entrypoint:
      - mongosh
      - mongodb://mongo:27017
      - --eval
      - "try { rs.status(); } catch (e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] }); }"
    restart: "no"

  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: "3000"
      MONGO_URI: mongodb://mongo:27017/studentbank_banking?replicaSet=rs0
      JWT_SECRET: "dev-only-change-in-production"
      CORS_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      mongo:
        condition: service_healthy

volumes:
  mongo_data: {}
