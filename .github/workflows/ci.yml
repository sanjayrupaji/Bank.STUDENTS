name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Verify frontend handlers
        working-directory: ${{ github.workspace }}
        run: node scripts/verify-handlers.js
      - name: Smoke-test API
        working-directory: ${{ github.workspace }}
        run: node scripts/test-backend.cjs

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: banking-dashboard
      - run: npm run build
        working-directory: banking-dashboard
